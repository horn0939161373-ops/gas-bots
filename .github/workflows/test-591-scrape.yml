name: Test 591 Scrape Connectivity

on:
  workflow_dispatch:
    inputs:
      region:
        description: '591 region 代碼（例如 1=台北市）'
        required: false
        default: '1'

jobs:
  test-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch 591 session cookie/token and call search API
        run: |
          node -e "
          const REGION = process.env.REGION || '1';
          const UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36';
          const BASE = 'https://rent.591.com.tw';

          async function main() {
            console.log('=== Step 1: 抓首頁取得 cookie/token ===');
            const homeRes = await fetch(BASE + '/', { headers: { 'User-Agent': UA } });
            console.log('首頁狀態碼:', homeRes.status);
            const setCookie = homeRes.headers.getSetCookie ? homeRes.headers.getSetCookie() : [homeRes.headers.get('set-cookie')].filter(Boolean);
            const cookieStr = setCookie.map(c => c.split(';')[0]).join('; ');
            console.log('拿到的 cookie 數量:', setCookie.length);
            const tokenMatch = cookieStr.match(/T591_TOKEN=([^;]+)/);
            const token = tokenMatch ? tokenMatch[1] : '';
            console.log('T591_TOKEN:', token ? '(有拿到，長度 ' + token.length + ')' : '(沒有拿到)');

            console.log('');
            console.log('=== Step 2: 呼叫搜尋 API ===');
            const params = new URLSearchParams({
              is_new_list: '1', type: '1', region: REGION,
              firstRow: '0', order: 'posttime', orderType: 'desc'
            });
            const apiRes = await fetch(BASE + '/home/search/rsList?' + params.toString(), {
              headers: {
                'User-Agent': UA,
                'Referer': BASE + '/',
                'X-CSRF-TOKEN': token,
                'Cookie': cookieStr,
                'Accept': 'application/json'
              }
            });
            console.log('API 狀態碼:', apiRes.status);
            const text = await apiRes.text();
            try {
              const json = JSON.parse(text);
              const items = (json && json.data && json.data.data) || [];
              console.log('✅ 成功解析 JSON，取得物件筆數:', items.length);
              if (items[0]) {
                console.log('第一筆範例:', JSON.stringify({
                  post_id: items[0].post_id, title: items[0].title, price: items[0].price
                }, null, 2));
              }
            } catch (e) {
              console.log('❌ 回應不是預期的 JSON，前 500 字元:');
              console.log(text.substring(0, 500));
            }
          }

          main().catch(e => { console.error('❌ 執行錯誤:', e.message); process.exit(1); });
          "
        env:
          REGION: ${{ inputs.region }}
