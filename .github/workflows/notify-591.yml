name: 591 租屋通知

on:
  schedule:
    # 避開整點/半點（:00、:30）這種最壅塞、最容易被 GitHub 丟掉的排程時段，
    # 改在每小時的 :09 與 :39 觸發（一樣約每 30 分鐘一次）。GitHub 的排程本來
    # 就是 best-effort、可能延遲或漏跑，錯開分鐘只是降低被丟掉的機率；要真正
    # 穩定請另外用外部定時器（例如 cron-job.org）呼叫 workflow_dispatch。
    - cron: '9,39 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: notify-591
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: notify-bot
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('notify-bot/package-lock.json') }}

      - name: Install Playwright Chromium
        working-directory: notify-bot
        run: npx playwright install --with-deps chromium

      - name: Run notify script
        working-directory: notify-bot
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
        run: node src/index.js

      - name: Commit updated state
        # push 失敗時先 rebase 遠端新 commit 再重試：單人版/多人版/手動觸發
        # 可能交錯執行，若 push 被拒就讓 job 失敗，已推紀錄不會存檔，
        # 下一輪會把同樣的物件再推一次（實際造成重複通知）。
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notify-bot/state/seen-listings.json notify-bot/state/listings-data.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: 更新已推播物件紀錄 [skip ci]"
          for i in 1 2 3; do
            git push && exit 0
            echo "push 失敗，rebase 遠端更新後重試（第 $i 次）"
            # -X theirs：rebase 時衝突區塊保留「本輪剛寫入的 state」（rebase
            # 語意下 theirs 指正在重放的本地 commit），避免 JSON 衝突卡死。
            git pull --rebase -X theirs origin "${GITHUB_REF_NAME}"
            sleep $((i * 2))
          done
          git push
