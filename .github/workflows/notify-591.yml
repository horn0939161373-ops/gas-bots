name: 591 租屋通知

on:
  schedule:
    # 避開整點/半點（:00、:30）這種最壅塞、最容易被 GitHub 丟掉的排程時段，
    # 改在每小時的 :09 與 :39 觸發（一樣約每 30 分鐘一次）。GitHub 的排程本來
    # 就是 best-effort、可能延遲或漏跑，錯開分鐘只是降低被丟掉的機率；要真正
    # 穩定請另外用外部定時器（例如 cron-job.org）呼叫 workflow_dispatch。
    - cron: '9,39 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: notify-591
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: notify-bot
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('notify-bot/package-lock.json') }}

      - name: Install Playwright Chromium
        working-directory: notify-bot
        run: npx playwright install --with-deps chromium

      - name: Run notify script
        working-directory: notify-bot
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
        run: node src/index.js

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notify-bot/state/seen-listings.json notify-bot/state/listings-data.json
          git diff --cached --quiet || git commit -m "chore: 更新已推播物件紀錄 [skip ci]"
          git push
