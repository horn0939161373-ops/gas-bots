name: Test Alternative Rental Sites Connectivity

on:
  workflow_dispatch: {}

jobs:
  test-sites:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch several candidate rental sites and report status codes
        run: |
          node -e "
          const UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36';
          const sites = [
            ['591 租屋網（對照組）', 'https://rent.591.com.tw/'],
            ['樂屋網', 'https://www.rakuya.com.tw/list/rent/taipei-city'],
            ['好房網', 'https://rent.housefun.com.tw/'],
            ['信義房屋', 'https://www.sinyi.com.tw/rent/'],
            ['永慶房屋', 'https://buy.yungching.com.tw/rent/'],
            ['崔媽媽基金會', 'https://www.tmm.org.tw/'],
            ['台灣房屋', 'https://www.taiwanhouse.com.tw/']
          ];

          async function main() {
            for (const [name, url] of sites) {
              try {
                const res = await fetch(url, { headers: { 'User-Agent': UA }, redirect: 'follow' });
                const text = await res.text();
                const isBlockPage = /request could not be satisfied|access denied|blocked|captcha/i.test(text.slice(0, 2000));
                console.log(\`\${name}\t\${url}\t狀態碼=\${res.status}\t內容長度=\${text.length}\t疑似攔截頁=\${isBlockPage}\`);
              } catch (e) {
                console.log(\`\${name}\t\${url}\t❌ 例外: \${e.message}\`);
              }
            }
          }
          main();
          "
