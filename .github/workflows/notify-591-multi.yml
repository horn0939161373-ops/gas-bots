name: 591 租屋通知（多人版）

# 多人版：讀 GAS 提供的訂閱清單，依每個人的條件各自推播。
# 一開始只開放手動觸發（workflow_dispatch），確認能跑、不會誤推之後，再把
# 下面的 schedule 取消註解啟用，並視情況停用單人版 notify-591.yml 以免重複
# 推播與吃掉雙倍 Actions 額度。
on:
  workflow_dispatch: {}
  schedule:
    - cron: '13,43 * * * *'

permissions:
  contents: write

concurrency:
  group: notify-591-multi
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: notify-bot
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('notify-bot/package-lock.json') }}

      - name: Install Playwright Chromium
        working-directory: notify-bot
        run: npx playwright install --with-deps chromium

      - name: Run multi-user notify script
        working-directory: notify-bot
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          SUBSCRIPTIONS_URL: ${{ secrets.SUBSCRIPTIONS_URL }}
        run: node src/index-multi.js

      - name: Commit updated state
        # push 失敗時先 rebase 遠端新 commit 再重試：單人版/多人版/手動觸發
        # 可能交錯執行，若 push 被拒就讓 job 失敗，已推紀錄不會存檔，
        # 下一輪會把同樣的物件再推一次（實際造成重複通知）。
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notify-bot/state/subscribers-seen.json notify-bot/state/listings-data.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: 更新多人版已推紀錄 [skip ci]"
          for i in 1 2 3; do
            git push && exit 0
            echo "push 失敗，rebase 遠端更新後重試（第 $i 次）"
            # -X theirs：rebase 時衝突區塊保留「本輪剛寫入的 state」（rebase
            # 語意下 theirs 指正在重放的本地 commit），避免 JSON 衝突卡死。
            git pull --rebase -X theirs origin "${GITHUB_REF_NAME}"
            sleep $((i * 2))
          done
          git push
