name: 米可手機報價通知

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: phone-quote
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: phone-quote-bot
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('phone-quote-bot/package-lock.json') }}

      - name: Install Playwright Chromium
        working-directory: phone-quote-bot
        run: npx playwright install --with-deps chromium

      - name: Run phone quote script
        working-directory: phone-quote-bot
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
        run: node src/index.js

      - name: Commit updated data and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/phones.json phone-quote-bot/state/last-prices.json
          git diff --cached --quiet || git commit -m "chore: 更新米可手機報價資料 [skip ci]"
          git push
